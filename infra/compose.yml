name: alarmstack

services:
  postgres:
    image: ${POSTGRES_IMAGE:-docker.io/library/postgres:16}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [alarm_net]

  minio:
    image: ${MINIO_IMAGE:-docker.io/minio/minio:RELEASE.2025-01-20T14-49-07Z}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [alarm_net]

  minio_bootstrap:
    image: ${MINIO_MC_IMAGE:-docker.io/minio/mc:RELEASE.2025-03-12T17-29-24Z}
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local ${MINIO_ENDPOINT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do echo 'waiting for minio'; sleep 3; done;
      mc mb -p local/raw || true;
      mc mb -p local/curated || true;
      mc mb -p local/features || true;
      mc mb -p local/models || true;
      mc mb -p local/mlflow-artifacts || true;
      mc version enable local/raw || true;
      mc version enable local/curated || true;
      mc version enable local/features || true;
      mc version enable local/models || true;
      mc version enable local/mlflow-artifacts || true;
      exit 0;
      "
    networks: [alarm_net]

  airflow-init:
    image: ${AIRFLOW_IMAGE:-docker.io/apache/airflow:2.10.3-python3.11}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-apache-spark==5.0.0
        apache-airflow-providers-amazon==8.28.0
        pyspark==3.5.4
        mlflow==2.17.2
        pandas==2.1.4
        scikit-learn==1.5.2
        imbalanced-learn==0.12.4
        xgboost==2.1.2
        great-expectations==1.2.4
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/jobs
      - ../:/workspace
      - ./airflow/requirements:/opt/airflow/requirements
      - ./great_expectations:/opt/airflow/gx
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    networks: [alarm_net]

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-docker.io/apache/airflow:2.10.3-python3.11}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-apache-spark==5.0.0
        apache-airflow-providers-amazon==8.28.0
        pyspark==3.5.4
        mlflow==2.17.2
        pandas==2.1.4
        scikit-learn==1.5.2
        imbalanced-learn==0.12.4
        xgboost==2.1.2
        great-expectations==1.2.4
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/jobs
      - ../:/workspace
      - ./great_expectations:/opt/airflow/gx
    command: webserver
    ports:
      - "8080:8080"
    networks: [alarm_net]

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-docker.io/apache/airflow:2.10.3-python3.11}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-apache-spark==5.0.0
        apache-airflow-providers-amazon==8.28.0
        pyspark==3.5.4
        mlflow==2.17.2
        pandas==2.1.4
        scikit-learn==1.5.2
        imbalanced-learn==0.12.4
        xgboost==2.1.2
        great-expectations==1.2.4
    user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./spark/jobs:/opt/airflow/jobs
      - ../:/workspace
      - ./great_expectations:/opt/airflow/gx
    command: scheduler
    networks: [alarm_net]

  spark-master:
    image: ${SPARK_IMAGE:-docker.io/library/spark:3.5.8-scala2.12-java17-python3-ubuntu}
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: ["/opt/spark/sbin/start-master.sh"]
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ../:/workspace
    networks: [alarm_net]

  spark-worker:
    image: ${SPARK_IMAGE:-docker.io/library/spark:3.5.8-scala2.12-java17-python3-ubuntu}
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ../:/workspace
    networks: [alarm_net]

  mlflow:
    image: ${MLFLOW_IMAGE:-ghcr.io/mlflow/mlflow:v2.17.2}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio_bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    command: >
      bash -c "pip install --quiet --no-cache-dir psycopg2-binary boto3 &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/mlflow
      --artifacts-destination s3://mlflow-artifacts"
    ports:
      - "5000:5000"
    networks: [alarm_net]

  inference-api:
    image: ${INFERENCE_BASE_IMAGE:-docker.io/tiangolo/uvicorn-gunicorn-fastapi:python3.11}
    depends_on:
      - mlflow
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_NAME: plant_alarm_champion
      PROMETHEUS_MULTIPROC_DIR: /tmp
      MODULE_NAME: app.main
      VARIABLE_NAME: app
      # CORS_ORIGINS is intentionally empty here: nginx is the sole ingress and
      # handles same-origin routing, so no CORS headers are needed in production.
      # Set to a comma-separated list of origins only when bypassing nginx (e.g.
      # local testing without compose): CORS_ORIGINS=http://localhost:5173
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - ../services/inference/app:/app/app
      - ../services/inference/requirements.txt:/app/requirements.txt
    command: >
      /bin/bash -c "pip install --no-cache-dir -r /app/requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # No host port published — reachable only via nginx on the internal network.
    # Prometheus scrapes inference-api:8000 directly on alarm_net (see prometheus.yml).
    networks: [alarm_net]

  file-watcher:
    image: ${FILE_WATCHER_IMAGE:-docker.io/library/alpine:3.20}
    depends_on:
      - airflow-webserver
    env_file:
      - .env
    volumes:
      - ../data_drop:/watch
      - ./watcher/watch-and-trigger.sh:/watch-and-trigger.sh
    command: >
      /bin/sh -c "apk add --no-cache inotify-tools curl && chmod +x /watch-and-trigger.sh && /watch-and-trigger.sh"
    networks: [alarm_net]

  prometheus:
    image: ${PROMETHEUS_IMAGE:-docker.io/prom/prometheus:v2.54.1}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [alarm_net]

  grafana:
    image: ${GRAFANA_IMAGE:-docker.io/grafana/grafana-oss:11.2.2}
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks: [alarm_net]

  svelte-ui:
    image: ${SVELTE_UI_IMAGE:-docker.io/library/node:20-alpine}
    working_dir: /app
    volumes:
      - ../ui/svelte:/app
    environment:
      # Relative path: the browser resolves /api against its current origin
      # (nginx:80), so this works regardless of hostname or port.
      VITE_API_URL: /api
    command: >
      /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    # No host port published — nginx is the sole external entry point for the UI.
    networks: [alarm_net]

  nginx:
    image: ${NGINX_IMAGE:-docker.io/library/nginx:1.27-alpine}
    depends_on:
      - inference-api
      - svelte-ui
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${UI_PORT:-8088}:80"
    networks: [alarm_net]

volumes:
  postgres_data:
  minio_data:
  grafana_data:

networks:
  alarm_net:
    driver: bridge
